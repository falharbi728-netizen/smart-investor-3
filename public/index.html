const Calculator = ({isAr}) => {
  const [amount,setAmount]=useState(1000000);
  const [years,setYears]=useState(5);
  const [roi,setRoi]=useState(20);
  const total=amount*Math.pow(1+roi/100,years);
  const profit=total-amount;
  return (
    <div style={{background:"rgba(6,182,212,0.05)",border:"1px solid rgba(6,182,212,0.2)",borderRadius:20,padding:24}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18}}>

        </div>
        <h3 style={{fontWeight:800,fontSize:15}}>{isAr?"حاسبة العائد الاستثماري":"ROI Calculator"}</h3>
      </div>
      {[
        {label:isAr?"مبلغ الاستثمار (مليون ريال)":"Investment (Million SAR)",v:amount,set:setAmount,min:100000,max:50000000,step:100000,disp:`${(amount/1e6).toFixed(1)}M`},
        {label:isAr?"سنوات الاستثمار":"Years",v:years,set:setYears,min:1,max:20,step:1,disp:`${years} ${isAr?"سنة":"yr"}`},
        {label:isAr?"العائد السنوي ٪":"Annual ROI %",v:roi,set:setRoi,min:1,max:50,step:1,disp:`${roi}%`},
      ].map((f,i)=>(

        <div style={{padding:14,borderRadius:12,background:"rgba(6,182,212,0.08)",textAlign:"center"}}>

        </div>
        <div style={{padding:14,borderRadius:12,background:"rgba(16,185,129,0.08)",textAlign:"center"}}>
          <p style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:4}}>{isAr?"صافي الربح":"Net Profit"}</p>
          <p style={{fontSize:18,fontWeight:800,color:"#10b981"}}>+{(profit/1e6).toFixed(2)}M</p>

      </div>
    </div>
  );
};

// Market Chart
const MarketChart = ({isAr}) => {
  const max=Math.max(...MDATA.map(d=>d.v)), min=Math.min(...MDATA.map(d=>d.v));
  const W=500,H=110;
  const pts=MDATA.map((d,i)=>({
    x:20+(i/(MDATA.length-1))*(W-40),
    y:H-18-((d.v-min)/(max-min))*(H-38),
    ...d
  }));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const area=path+` L${pts[pts.length-1].x},${H-18} L${pts[0].x},${H-18} Z`;
  return (
    <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:20,padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <h3 style={{fontWeight:700,fontSize:14}}>{isAr?"مؤشر السوق الاستثماري":"Investment Market Index"}</h3>
          <p style={{color:"#10b981",fontSize:12,fontWeight:600,marginTop:2}}>▲ +14.3% {isAr?"هذا العام":"YTD"}</p>
        </div>
        <span style={{fontSize:10,padding:"4px 10px",borderRadius:99,background:"rgba(16,185,129,0.15)",color:"#10b981",fontWeight:700}}>
          {isAr?"مباشر":"LIVE"}
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",overflow:"visible"}}>
        <defs>
          <linearGradient id="cgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#06b6d4" stopOpacity="0.3"/>
            <stop offset="100%" stopColor="#06b6d4" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={area} fill="url(#cgrad)"/>
        <path d={path} fill="none" stroke="#06b6d4" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <circle key={i} cx={p.x} cy={p.y} r="4" fill="#06b6d4" stroke="#060d1a" strokeWidth="2"/>
        ))}
        {pts.map((p,i)=>(
          <text key={i} x={p.x} y={H} textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="8">
            {isAr?p.m:p.me}
          </text>
        ))}
      </svg>
    </div>
  );
};

const ComparePanel = ({opps,isAr,onClose}) => {
  const metrics=[
    {l:isAr?"التكلفة":"Cost",k:"cost",fmt:v=>`${(v/1e6).toFixed(0)}M SAR`},
    {l:isAr?"العائد":"ROI",k:"roi",fmt:v=>`${v}%`,hi:true},
    {l:"Smart Score",k:"score",fmt:v=>`${v}/100`,hi:true},
    {l:isAr?"التمويل":"Funded",k:"fundedPct",fmt:v=>`${v}%`,hi:true},
  ];
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:60,background:"rgba(0,0,12,0.85)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

          <button onClick={onClose} style={{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,0.08)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <SVGIcon name="x" size={13} color="rgba(255,255,255,0.6)"/>
          </button>
        </div>
        <div style={{padding:22,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>
                <th style={{textAlign:isAr?"right":"left",padding:"8px 10px",color:"rgba(255,255,255,0.4)",fontSize:11,width:"30%"}}>{isAr?"المعيار":"Metric"}</th>
                {opps.map(o=>(
                  <th key={o.id} style={{textAlign:"center",padding:"8px 10px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#06b6d4"}}>{isAr?o.title:o.titleEn}</div>

                ))}

            <tbody>
              {metrics.map((m,i)=>(
                <tr key={i} style={{background:i%2===0?"rgba(255,255,255,0.02)":"transparent"}}>
                  <td style={{padding:"9px 10px",fontSize:12,color:"rgba(255,255,255,0.6)"}}>{m.l}</td>
                  {opps.map(o=>{
                    const v=o[m.k];
                    const isTop=m.hi&&opps.every(x=>x[m.k]<=v);
                    return (
                      <td key={o.id} style={{textAlign:"center",padding:"9px 10px",fontSize:12,fontWeight:600,color:isTop?"#10b981":"#fff"}}>
                        {m.fmt(v)}{isTop?" ✓":""}
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filtered.map(o=>{
                  const si=SECTORS.find(s=>s.ar===o.sector);
                  return (
                    <div key={o.id} onClick={()=>setSel(o)} style={{display:"flex",gap:12,padding:13,borderRadius:15,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",cursor:"pointer",transition:"all 0.2s"}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(6,182,212,0.3)"}
                      onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.07)"}>
                      <img src={o.image} style={{width:76,height:76,borderRadius:11,objectFit:"cover",flexShrink:0}} alt=""/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                          <p style={{fontWeight:700,fontSize:14}}>{isAr?o.title:o.titleEn}</p>
                          {o.tag&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"rgba(6,182,212,0.15)",color:"#06b6d4"}}>{o.tag}</span>}
                        </div>
                        <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{isAr?o.city:o.cityEn} · {si?.icon} {isAr?o.sector:o.sectorEn}</p>
                        <div style={{display:"flex",gap:12,marginTop:5}}>
                          <span style={{fontSize:11,color:"#10b981",fontWeight:600}}>ROI {o.roi}%</span>
                          <span style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{(o.cost/1e6).toFixed(0)}M SAR</span>
                          <span style={{fontSize:11,color:"#06b6d4",fontWeight:700}}>▲ {o.trend}</span>
                        </div>
                        <div style={{marginTop:6,maxWidth:220}}><FundBar pct={o.fundedPct} isAr={isAr}/></div>
                      </div>
                      <div style={{alignSelf:"center"}}><Ring v={o.score} size={46}/></div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* MAP */}
        {page==="map"&&(
          <div className="fu">
            <div style={{marginBottom:18}}>
              <h1 style={{fontWeight:800,fontSize:22}}>{isAr?"خريطة الاستثمارات التفاعلية":"Interactive Investment Map"}</h1>
              <p style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:3}}>{isAr?"استكشف الفرص جغرافياً عبر مناطق المملكة":"Explore opportunities geographically across Saudi Arabia"}</p>
            </div>
            <MapView opps={filtered} isAr={isAr} onView={setSel}/>
          </div>
        )}

        {/* CONSULTANTS */}
        {page==="consultants"&&(
          <div className="fu">
            <div style={{marginBottom:20}}>
              <h1 style={{fontWeight:800,fontSize:22}}>{isAr?"المستشارون الماليون":"Financial Consultants"}</h1>
              <p style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:3}}>{isAr?"تواصل مع أفضل المستشارين في المملكة":"Connect with Saudi Arabia's top advisors"}</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>
              {CONSULTANTS.map(c=>(
                <div key={c.id} style={{borderRadius:20,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",padding:20,transition:"all 0.3s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(6,182,212,0.3)";e.currentTarget.style.transform="translateY(-3px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.07)";e.currentTarget.style.transform="translateY(0)";}}>
                  <div style={{display:"flex",gap:13,marginBottom:15}}>
                    <div style={{width:54,height:54,borderRadius:15,background:"rgba(6,182,212,0.12)",border:"1px solid rgba(6,182,212,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:800,color:"#06b6d4",flexShrink:0,position:"relative"}}>
                      {c.avatar}
                      {c.verified&&<div style={{position:"absolute",bottom:-3,right:-3,width:17,height:17,borderRadius:"50%",background:"#10b981",border:"2px solid #060d1a",display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <SVGIcon name="check" size={9} color="white"/>
                      </div>}
                    </div>
                    <div>
                      <p style={{fontWeight:800,fontSize:14}}>{isAr?c.name:c.nameEn}</p>
                      <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{isAr?c.specialty:c.specialtyEn}</p>
                      <p style={{fontSize:10,color:"rgba(255,255,255,0.3)",display:"flex",alignItems:"center",gap:3,marginTop:3}}>
                        <SVGIcon name="pin" size={9} color="rgba(255,255,255,0.3)"/>{isAr?c.city:c.cityEn}
                      </p>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:13}}>
                    {[{l:isAr?"التقييم":"Rating",v:c.rating,c:"#f59e0b"},{l:isAr?"الدراسات":"Studies",v:c.studies},{l:isAr?"العملاء":"Clients",v:c.clients}].map((s,i)=>(
                      <div key={i} style={{textAlign:"center",padding:"8px 5px",borderRadius:9,background:"rgba(255,255,255,0.04)"}}>
                        <p style={{fontSize:13,fontWeight:800,color:s.c||"#fff"}}>{s.v}</p>
                        <p style={{fontSize:9,color:"rgba(255,255,255,0.3)",marginTop:2}}>{s.l}</p>
                      </div>
                    ))}
                  </div>
                  <p style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:11}}>{isAr?"وقت الاستجابة: ":"Response: "}<span style={{color:"#10b981"}}>{isAr?c.responseTimeAr:c.responseTimeEn}</span></p>
                  <button onClick={()=>setPage("messages")} style={{width:"100%",padding:"10px",borderRadius:10,fontSize:12,fontWeight:700,background:"linear-gradient(135deg,#0891b2,#06b6d4)",color:"#fff",border:"none",cursor:"pointer"}}>
                    💬 {isAr?"تواصل الآن":"Contact Now"}
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TOOLS */}
        {page==="tools"&&(
          <div className="fu">
            <div style={{marginBottom:20}}>
              <h1 style={{fontWeight:800,fontSize:22}}>{isAr?"أدوات الاستثمار الذكية":"Smart Investment Tools"}</h1>
              <p style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:3}}>{isAr?"استخدم أدواتنا لاتخاذ قرارات مدروسة":"Use our tools to make informed decisions"}</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:18}}>
              <Calculator isAr={isAr}/>
              <MarketChart isAr={isAr}/>
              {/* Sector breakdown */}
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:20,padding:20}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                  <div style={{width:34,height:34,borderRadius:9,background:"rgba(139,92,246,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <SVGIcon name="chart" size={15} color="#8b5cf6"/>
                  </div>
                  <h3 style={{fontWeight:800,fontSize:14}}>{isAr?"توزيع القطاعات":"Sector Distribution"}</h3>
                </div>
                {SECTORS.map(s=>{
                  const count=OPPORTUNITIES.filter(o=>o.sector===s.ar).length;
                  const pct=(count/OPPORTUNITIES.length)*100;
                  return count>0?(
                    <div key={s.ar} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>{s.icon} {isAr?s.ar:s.en}</span>
                        <span style={{fontSize:11,fontWeight:700,color:s.color}}>{count}</span>
                      </div>
                      <div style={{height:5,borderRadius:99,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,background:s.color,borderRadius:99}}/>
                      </div>
                    </div>
                  ):null;
                })}
              </div>
              {/* Risk Matrix */}
              <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:20,padding:20}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                  <div style={{width:34,height:34,borderRadius:9,background:"rgba(245,158,11,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <SVGIcon name="shield" size={15} color="#f59e0b"/>
                  </div>
                  <h3 style={{fontWeight:800,fontSize:14}}>{isAr?"مصفوفة المخاطر والعائد":"Risk vs Return"}</h3>
                </div>
                <div style={{position:"relative",height:180,background:"rgba(255,255,255,0.02)",borderRadius:10,overflow:"hidden",marginBottom:8}}>
                  <div style={{position:"absolute",left:10,top:8,bottom:18,width:1,background:"rgba(255,255,255,0.08)"}}/>
                  <div style={{position:"absolute",left:10,right:8,bottom:18,height:1,background:"rgba(255,255,255,0.08)"}}/>
                  <span style={{position:"absolute",bottom:4,left:12,fontSize:8,color:"rgba(255,255,255,0.2)"}}>{isAr?"منخفض":"Low"}</span>
                  <span style={{position:"absolute",bottom:4,right:8,fontSize:8,color:"rgba(255,255,255,0.2)"}}>{isAr?"مرتفع":"High"}</span>
                  <span style={{position:"absolute",top:4,left:14,fontSize:8,color:"rgba(255,255,255,0.2)",writingMode:"vertical-lr"}}>{isAr?"عائد↑":"ROI↑"}</span>
                  {OPPORTUNITIES.slice(0,6).map(o=>{
                    const riskNum=o.risk==="منخفض"?0.15:o.risk==="متوسط"?0.5:0.85;
                    const roiN=(o.roi-15)/(35-15);
                    const si=SECTORS.find(s=>s.ar===o.sector);
                    return (
                      <div key={o.id} onClick={()=>setSel(o)} style={{position:"absolute",left:`${riskNum*80+12}%`,bottom:`${roiN*70+14}%`,transform:"translate(-50%,50%)",cursor:"pointer"}}>
                        <div style={{width:26,height:26,borderRadius:"50%",background:`${si?.color||"#06b6d4"}33`,border:`2px solid ${si?.color||"#06b6d4"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}} title={isAr?o.title:o.titleEn}>
                          {si?.icon}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <p style={{fontSize:10,color:"rgba(255,255,255,0.3)",textAlign:"center"}}>{isAr?"انقر على أي نقطة لعرض تفاصيل الفرصة":"Click any dot to view opportunity details"}</p>
              </div>
            </div>
          </div>
        )}

        {/* DASHBOARD */}
        {page==="dashboard"&&(
          <div className="fu">
            <div style={{marginBottom:20}}>
              <h1 style={{fontWeight:800,fontSize:22}}>{isAr?"لوحة التحكم":"Dashboard"}</h1>
              <p style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:3}}>{isAr?"تتبع نشاطك الاستثماري":"Track your investment activity"}</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:24}}>
              {[
                {l:isAr?"محفوظة":"Saved",v:saved.length,icon:"heart",c:"#ef4444"},
                {l:isAr?"المشاهدات":"Viewed",v:47,icon:"eye",c:"#06b6d4"},
                {l:isAr?"الرسائل":"Messages",v:3,icon:"msg",c:"#f59e0b"},
                {l:isAr?"متوسط العائد":"Avg ROI",v:"24%",icon:"trend",c:"#10b981"},
                {l:isAr?"مقارنة":"Compare",v:compareList.length,icon:"compare",c:"#8b5cf6"},
              ].map((s,i)=>(
                <div key={i} style={{padding:"15px 13px",borderRadius:15,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
                  <div style={{width:30,height:30,borderRadius:8,background:`${s.c}1a`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:7}}>
                    <SVGIcon name={s.icon} size={14} color={s.c}/>
                  </div>
                  <p style={{fontSize:19,fontWeight:800}}>{s.v}</p>
                  <p style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2}}>{s.l}</p>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:18}}>
              <div>
                <h3 style={{fontWeight:700,fontSize:14,marginBottom:13}}>{isAr?"الفرص المحفوظة":"Saved Opportunities"}</h3>
                {OPPORTUNITIES.filter(o=>saved.includes(o.id)).length===0?(
                  <div style={{textAlign:"center",padding:"28px",color:"rgba(255,255,255,0.2)"}}>
                    <SVGIcon name="heart" size={32} color="rgba(255,255,255,0.15)"/>
                    <p style={{fontSize:12,marginTop:9}}>{isAr?"لا توجد فرص محفوظة":"No saved opportunities"}</p>
                  </div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {OPPORTUNITIES.filter(o=>saved.includes(o.id)).map(o=>(
                      <div key={o.id} onClick={()=>setSel(o)} style={{display:"flex",gap:11,padding:10,borderRadius:11,background:"rgba(255,255,255,0.03)",cursor:"pointer"}}>
                        <img src={o.image} style={{width:48,height:48,borderRadius:9,objectFit:"cover"}} alt=""/>
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{fontSize:12,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{isAr?o.title:o.titleEn}</p>
                          <p style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:2}}>{isAr?o.city:o.cityEn} · <span style={{color:"#10b981"}}>{o.roi}%</span></p>
                          <div style={{marginTop:4}}><FundBar pct={o.fundedPct} isAr={isAr}/></div>
                        </div>
                        <Ring v={o.score} size={40}/>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div><MarketChart isAr={isAr}/></div>
            </div>
          </div>
        )}

        {/* MESSAGES */}
        {page==="messages"&&(
          <div className="fu">
            <div style={{marginBottom:20}}>
              <h1 style={{fontWeight:800,fontSize:22}}>{isAr?"المراسلات":"Messages"}</h1>
              <p style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginTop:3}}>{isAr?"تواصل مع المستشارين الماليين":"Communicate with financial consultants"}</p>
            </div>
            <Messaging isAr={isAr}/>
          </div>
        )}
      </main>

      {/* MODALS */}
      {sel&&<DetailModal o={sel} isAr={isAr} onClose={()=>setSel(null)} saved={saved.includes(sel.id)} onSave={toggleSave}/>}
      {showCompare&&compareList.length>=2&&<ComparePanel opps={compareList} isAr={isAr} onClose={()=>setShowCompare(false)}/>}

      {/* COMPARE BAR */}
      {compareList.length>=2&&(
        <div style={{position:"fixed",bottom:68,left:"50%",transform:"translateX(-50%)",zIndex:35,background:"rgba(6,182,212,0.92)",backdropFilter:"blur(16px)",borderRadius:99,padding:"9px 18px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 8px 36px rgba(6,182,212,0.4)",whiteSpace:"nowrap"}}>
          <span style={{fontSize:12,fontWeight:700,color:"#fff"}}>{isAr?`${compareList.length} فرص`:`${compareList.length} items`}</span>
          <button onClick={()=>setShowCompare(true)} style={{padding:"5px 14px",borderRadius:99,background:"#fff",color:"#0891b2",fontSize:11,fontWeight:800,border:"none",cursor:"pointer"}}>
            {isAr?"قارن":"Compare"}
          </button>
          <button onClick={()=>setCompareList([])} style={{background:"rgba(255,255,255,0.2)",border:"none",width:22,height:22,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <SVGIcon name="x" size={10} color="white"/>
          </button>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(6,13,26,0.97)",borderTop:"1px solid rgba(6,182,212,0.1)",display:"flex",justifyContent:"space-around",padding:"8px 4px 11px",zIndex:30,backdropFilter:"blur(20px)"}}>
        {navLinks.map(l=>(
          <button key={l.id} onClick={()=>setPage(l.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"3px 5px",borderRadius:7,minWidth:0}}>
            <SVGIcon name={l.icon} size={18} color={page===l.id?"#06b6d4":"rgba(255,255,255,0.25)"}/>
            <span style={{fontSize:8,color:page===l.id?"#06b6d4":"rgba(255,255,255,0.25)",fontWeight:page===l.id?700:400,whiteSpace:"nowrap"}}>{l.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
